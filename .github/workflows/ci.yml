name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Check imports
        run: python -c "from shared import create_logger, timed, save_jsonl; print('OK')"

      - name: Verify examples parse
        run: |
          python -m py_compile platforms/xiaohongshu/collect_by_keyword.py
          python -m py_compile platforms/xiaohongshu/collect_by_keyword_api.py
          python -m py_compile platforms/x/collect_by_keyword.py
          python -m py_compile platforms/x/collect_by_keyword_api.py
          python -m py_compile platforms/_template/basic_collect.py
          python -m py_compile shared/logger.py
          python -m py_compile shared/output.py
